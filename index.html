  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

v style=\"position:absolute; left:{{ sunX }}%; top:{{ sunY }}%; width:76px; height:76px; margin-left:-38px; margin-top:-38px; border-radius:50%; background:{{ sunColor }}; opacity:{{ sunOpacity }}; box-shadow:0 0 60px 20px {{ sunGlow }}; transition:opacity 0.3s linear;\"><\u002Fdiv>\n\n  <!-- moon -->\n  <div style=\"position:absolute; left:{{ moonX }}%; top:{{ moonY }}%; width:56px; height:56px; margin-left:-28px; margin-top:-28px; border-radius:50%; background:#eef1fa; opacity:{{ moonOpacity }}; box-shadow:0 0 36px 10px rgba(220,225,250,0.35), inset -14px -6px 0 0 rgba(10,14,35,0.25); transition:opacity 0.3s linear;\"><\u002Fdiv>\n\n  <!-- mountains -->\n  <div style=\"position:absolute; bottom:0; left:0; right:0; height:42%;\">\n    <div style=\"position:absolute; bottom:0; left:0; right:0; height:70%; background:{{ mountainFar }}; clip-path:polygon(0% 60%, 12% 40%, 24% 55%, 38% 25%, 52% 48%, 66% 30%, 80% 50%, 92% 35%, 100% 55%, 100% 100%, 0% 100%);\"><\u002Fdiv>\n    <div style=\"position:absolute; bottom:0; left:0; right:0; height:55%; background:{{ mountainNear }}; clip-path:polygon(0% 70%, 10% 45%, 20% 65%, 34% 38%, 48% 62%, 64% 40%, 78% 68%, 90% 48%, 100% 66%, 100% 100%, 0% 100%);\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- sling aim line -->\n  <sc-if value=\"{{ isAiming }}\" hint-placeholder-val=\"{{ false }}\">\n    <svg style=\"position:absolute; inset:0; width:100%; height:100%; pointer-events:none;\">\n      <line x1=\"{{ aimAnchorPx.x }}\" y1=\"{{ aimAnchorPx.y }}\" x2=\"{{ aimCurrentPx.x }}\" y2=\"{{ aimCurrentPx.y }}\" stroke=\"rgba(255,255,255,0.55)\" stroke-width=\"2\" stroke-dasharray=\"6 6\"><\u002Fline>\n      <circle cx=\"{{ aimAnchorPx.x }}\" cy=\"{{ aimAnchorPx.y }}\" r=\"5\" fill=\"rgba(255,255,255,0.8)\"><\u002Fcircle>\n    <\u002Fsvg>\n  <\u002Fsc-if>\n\n  <!-- planes -->\n  <sc-for list=\"{{ planes }}\" as=\"pl\" hint-placeholder-count=\"0\">\n    <div style=\"position:absolute; left:{{ pl.left }}%; top:{{ pl.top }}%; width:0; height:0; pointer-events:none;\">\n      <div style=\"position:absolute; left:0; top:0; transform:{{ pl.transform }}; display:flex; align-items:center; gap:0;\">\n        <svg width=\"34\" height=\"16\" sc-camel-view-box=\"0 0 34 16\" style=\"filter:drop-shadow(0 1px 2px rgba(0,0,0,0.35)); overflow:visible;\">\n          <path d=\"M2 9 L14 8 L20 2 L23 2.5 L18.5 8.5 L27 8.7 L31 6.5 L32.5 7.3 L30 10.2 L18.5 10.5 L15 14.5 L12 14.2 L14.3 10.3 L2 10.2 Z\" fill=\"{{ pl.color }}\"><\u002Fpath>\n        <\u002Fsvg>\n        <div style=\"width:{{ pl.trailLen }}px; height:1.5px; background:linear-gradient(90deg, {{ pl.trailColor }} 0%, rgba(255,255,255,0) 100%); margin-left:-2px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <!-- time readout -->\n  <div style=\"position:absolute; top:48px; right:56px; text-align:right; color:{{ textColor }}; transition:color 0.3s linear;\">\n    <div style=\"font-family:'Fraunces',serif; font-size:56px; font-weight:600; font-variant-numeric:tabular-nums;\">{{ timeLabel }}<\u002Fdiv>\n    <div style=\"font-size:15px; opacity:0.75;\">{{ phaseLabel }}<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nfunction hexToRgb(hex) {\n  const h = hex.replace('#', '');\n  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];\n}\nfunction rgbToHex(rgb) {\n  return '#' + rgb.map(v => Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,'0')).join('');\n}\nfunction lerpColor(c1, c2, t) {\n  const a = hexToRgb(c1), b = hexToRgb(c2);\n  return rgbToHex([a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]);\n}\n\n// keyframes across 24h: {h, top, mid, horizon, mountainFar, mountainNear, text, phase}\nconst KEYFRAMES = [\n  { h: 0,    top:'#050718', mid:'#0c1030', horizon:'#161b3d', mFar:'#0a0d20', mNear:'#05060f', text:'#e8ebf7', phase:'Noche cerrada' },\n  { h: 4,    top:'#0b0e2c', mid:'#1a2050', horizon:'#3a3060', mFar:'#12142c', mNear:'#080915', text:'#e8ebf7', phase:'Antes del alba' },\n  { h: 5.5,  top:'#26315f', mid:'#5a4a78', horizon:'#c47a6a', mFar:'#221f3a', mNear:'#0d0d18', text:'#f5efe8', phase:'Amanecer' },\n  { h: 7,    top:'#5f8ac0', mid:'#a8b8d8', horizon:'#ffcf9e', mFar:'#3a4560', mNear:'#20232f', text:'#241b12', phase:'Salida del sol' },\n  { h: 9,    top:'#4d9fdb', mid:'#8fc3ea', horizon:'#dcedf7', mFar:'#4a5a75', mNear:'#2a3140', text:'#1c1509', phase:'Mañana' },\n  { h: 12,   top:'#3f9be6', mid:'#7cc0ee', horizon:'#d8eefc', mFar:'#54697f', mNear:'#33404e', text:'#0f1620', phase:'Mediodía' },\n  { h: 15,   top:'#4a9adf', mid:'#8ec2e8', horizon:'#f3e3b8', mFar:'#546076', mNear:'#303a48', text:'#1a1508', phase:'Tarde' },\n  { h: 17.5, top:'#3d6ba0', mid:'#c98a6e', horizon:'#ff8f5e', mFar:'#3c3550', mNear:'#1c1826', text:'#2a1408', phase:'Atardecer' },\n  { h: 19,   top:'#2a3364', mid:'#6a4a72', horizon:'#c05a72', mFar:'#231f3a', mNear:'#0f0d1a', text:'#f6e8ea', phase:'Crepúsculo' },\n  { h: 20.5, top:'#141a3e', mid:'#241f4a', horizon:'#3a2a4a', mFar:'#16152c', mNear:'#08070f', text:'#e8ebf7', phase:'Anochecer' },\n  { h: 24,   top:'#050718', mid:'#0c1030', horizon:'#161b3d', mFar:'#0a0d20', mNear:'#05060f', text:'#e8ebf7', phase:'Noche cerrada' },\n];\n\nfunction interpolateFrame(hour) {\n  let a = KEYFRAMES[0], b = KEYFRAMES[KEYFRAMES.length - 1];\n  for (let i = 0; i < KEYFRAMES.length - 1; i++) {\n    if (hour >= KEYFRAMES[i].h && hour <= KEYFRAMES[i+1].h) { a = KEYFRAMES[i]; b = KEYFRAMES[i+1]; break; }\n  }\n  const span = b.h - a.h || 1;\n  const t = (hour - a.h) / span;\n  return {\n    top: lerpColor(a.top, b.top, t),\n    mid: lerpColor(a.mid, b.mid, t),\n    horizon: lerpColor(a.horizon, b.horizon, t),\n    mFar: lerpColor(a.mFar, b.mFar, t),\n    mNear: lerpColor(a.mNear, b.mNear, t),\n    text: lerpColor(a.text, b.text, t),\n    phase: t < 0.5 ? a.phase : b.phase,\n  };\n}\n\nfunction nowMinutes() {\n  const d = new Date();\n  return d.getHours() * 60 + d.getMinutes();\n}\n\nlet planeIdSeq = 0;\n\nclass Component extends DCLogic {\n  state = { minutes: nowMinutes(), playing: false, live: true, planes: [], aiming: false, aimAnchor: null, aimCurrent: null };\n\n  skyRef = (el) => {\n    if (this._skyEl && this._skyEl !== el) this.detachSkyListeners();\n    this._skyEl = el;\n    if (el) this.attachSkyListeners();\n  };\n\n  attachSkyListeners() {\n    const el = this._skyEl;\n    this._onMouseDown = (e) => this.dragStart(el.getBoundingClientRect(), e.clientX, e.clientY);\n    this._onMouseMove = (e) => this.dragMove(e.clientX, e.clientY);\n    this._onMouseUp = (e) => this.dragEnd(e.clientX, e.clientY);\n    this._onTouchStart = (e) => { const t = e.touches[0]; if (t) this.dragStart(el.getBoundingClientRect(), t.clientX, t.clientY); };\n    this._onTouchMove = (e) => { const t = e.touches[0]; if (t) this.dragMove(t.clientX, t.clientY); };\n    this._onTouchEnd = (e) => { const t = e.changedTouches[0]; if (t) this.dragEnd(t.clientX, t.clientY); };\n    el.addEventListener('mousedown', this._onMouseDown);\n    window.addEventListener('mousemove', this._onMouseMove);\n    window.addEventListener('mouseup', this._onMouseUp);\n    el.addEventListener('touchstart', this._onTouchStart, { passive: true });\n    window.addEventListener('touchmove', this._onTouchMove, { passive: true });\n    window.addEventListener('touchend', this._onTouchEnd);\n  }\n\n  detachSkyListeners() {\n    const el = this._skyEl;\n    if (el) {\n      el.removeEventListener('mousedown', this._onMouseDown);\n      el.removeEventListener('touchstart', this._onTouchStart);\n    }\n    window.removeEventListener('mousemove', this._onMouseMove);\n    window.removeEventListener('mouseup', this._onMouseUp);\n    window.removeEventListener('touchmove', this._onTouchMove);\n    window.removeEventListener('touchend', this._onTouchEnd);\n  }\n\n  componentDidMount() {\n    this._liveTimer = setInterval(() => {\n      if (this.state.live && !document.hidden) this.setState({ minutes: nowMinutes() });\n    }, 15000);\n    this._onVisibility = () => {\n      if (!document.hidden) {\n        if (this.state.live) this.setState({ minutes: nowMinutes() });\n        this.ensureTicker();\n      }\n    };\n    document.addEventListener('visibilitychange', this._onVisibility);\n    this.scheduleNextPlane();\n  }\n\n  // rAF ticker: runs ONLY while planes are on screen and page is visible\n  ensureTicker = () => {\n    if (this._rafId || !this.state.planes.length) return;\n    const tick = () => {\n      this._rafId = null;\n      if (document.hidden) return;\n      const now = Date.now();\n      const alive = this.state.planes.filter(pl => (now - pl.startedAt) < pl.duration);\n      if (alive.length !== this.state.planes.length) {\n        this.setState({ planes: alive });\n      } else {\n        this.forceUpdate();\n      }\n      if (alive.length) this._rafId = requestAnimationFrame(tick);\n    };\n    this._rafId = requestAnimationFrame(tick);\n  };\n\n  componentWillUnmount() {\n    if (this._timer) clearInterval(this._timer);\n    if (this._liveTimer) clearInterval(this._liveTimer);\n    if (this._rafId) cancelAnimationFrame(this._rafId);\n    if (this._planeSpawnTimer) clearTimeout(this._planeSpawnTimer);\n    document.removeEventListener('visibilitychange', this._onVisibility);\n    this.detachSkyListeners();\n  }\n\n  scheduleNextPlane = () => {\n    const wait = 25000 + Math.random() * 35000; // 25-60s\n    this._planeSpawnTimer = setTimeout(() => {\n      if (!document.hidden) this.spawnPlane();\n      this.scheduleNextPlane();\n    }, wait);\n  };\n\n  spawnPlane = (startLeft, startTop) => {\n    const hasOrigin = startLeft !== undefined;\n    const dir = hasOrigin ? (startLeft < 50 ? 1 : -1) : (Math.random() < 0.5 ? 1 : -1);\n    const plane = {\n      id: planeIdSeq++,\n      mode: 'edge',\n      startedAt: Date.now(),\n      duration: 14000 + Math.random() * 6000,\n      startLeft: hasOrigin ? startLeft : (dir > 0 ? -6 : 106),\n      top: hasOrigin ? startTop : 8 + Math.random() * 28,\n      dir,\n      trailLen: 60 + Math.random() * 30,\n    };\n    this.setState(s => ({ planes: [...s.planes, plane].slice(-8) }), this.ensureTicker);\n  };\n\n  spawnSlingPlane = (leftPct, topPct, ux, uy, rectW, rectH, duration) => {\n    const plane = {\n      id: planeIdSeq++,\n      mode: 'sling',\n      startedAt: Date.now(),\n      duration,\n      originLeft: leftPct,\n      originTop: topPct,\n      ux, uy, rectW, rectH,\n      trailLen: 60 + Math.random() * 30,\n    };\n    this.setState(s => ({ planes: [...s.planes, plane].slice(-8) }), this.ensureTicker);\n  };\n\n  dragStart = (rect, clientX, clientY) => {\n    this._dragRect = rect;\n    const p = { x: clientX - rect.left, y: clientY - rect.top };\n    this.setState({ aiming: true, aimAnchor: p, aimCurrent: p });\n  };\n\n  dragMove = (clientX, clientY) => {\n    if (!this.state.aiming || !this._dragRect) return;\n    const rect = this._dragRect;\n    this.setState({ aimCurrent: { x: clientX - rect.left, y: clientY - rect.top } });\n  };\n\n  dragEnd = (clientX, clientY) => {\n    if (!this.state.aiming || !this._dragRect) return;\n    const rect = this._dragRect;\n    const anchor = this.state.aimAnchor;\n    const cur = { x: clientX - rect.left, y: clientY - rect.top };\n    const dx = anchor.x - cur.x;\n    const dy = anchor.y - cur.y;\n    const dist = Math.hypot(dx, dy);\n    const anchorLeftPct = (anchor.x / rect.width) * 100;\n    const anchorTopPct = (anchor.y / rect.height) * 100;\n\n    if (dist < 16) {\n      this.spawnPlane(anchorLeftPct, anchorTopPct);\n    } else {\n      const ux = dx / dist, uy = dy / dist;\n      const duration = Math.max(700, Math.min(9000, 9500 - dist * 16));\n      this.spawnSlingPlane(anchorLeftPct, anchorTopPct, ux, uy, rect.width, rect.height, duration);\n    }\n    this.setState({ aiming: false, aimAnchor: null, aimCurrent: null });\n  };\n\n\n\n  toggleLive = () => {\n    if (this.state.playing) this.togglePlay();\n    this.setState(s => ({ live: !s.live, minutes: !s.live ? nowMinutes() : s.minutes }));\n  };\n\n  setMinutes(m) {\n    m = ((m % 1440) + 1440) % 1440;\n    this.setState({ minutes: m });\n  }\n\n  togglePlay = () => {\n    if (this.state.live) this.setState({ live: false });\n    if (this.state.playing) {\n      clearInterval(this._timer);\n      this._timer = null;\n      this.setState({ playing: false });\n    } else {\n      this._timer = setInterval(() => {\n        this.setMinutes(this.state.minutes + 2);\n      }, 60);\n      this.setState({ playing: true });\n    }\n  };\n\n  onSlide = (e) => {\n    if (this.state.playing) this.togglePlay();\n    if (this.state.live) this.setState({ live: false });\n    this.setMinutes(parseInt(e.target.value, 10));\n  };\n\n  setPreset = (m) => () => {\n    if (this.state.playing) this.togglePlay();\n    if (this.state.live) this.setState({ live: false });\n    this.setMinutes(m);\n  };\n\n  renderVals() {\n    const minutes = this.state.minutes;\n    const hour = minutes / 60;\n    const f = interpolateFrame(hour);\n\n    const hh = Math.floor(hour).toString().padStart(2, '0');\n    const mm = Math.floor(minutes % 60).toString().padStart(2, '0');\n\n    // sun arc: visible ~5.5-19, peak at 12\n    const sunStart = 5.0, sunEnd = 19.5;\n    const sunProgress = (hour - sunStart) / (sunEnd - sunStart);\n    const sunX = 8 + sunProgress * 84;\n    const sunY = 78 - Math.sin(Math.max(0, Math.min(1, sunProgress)) * Math.PI) * 60;\n    const sunVisible = hour > sunStart - 0.8 && hour < sunEnd + 0.8;\n    const sunFade = Math.min(1, Math.min((hour - (sunStart - 0.8)), ((sunEnd + 0.8) - hour)) / 0.8);\n    const sunOpacity = sunVisible ? Math.max(0, Math.min(1, sunFade)) : 0;\n\n    // moon arc: visible ~19-29 (wraps to next day 5)\n    let moonHour = hour < sunStart ? hour + 24 : hour;\n    const moonStart = 18.5, moonEnd = 29.5;\n    const moonProgress = (moonHour - moonStart) / (moonEnd - moonStart);\n    const moonX = 8 + moonProgress * 84;\n    const moonY = 78 - Math.sin(Math.max(0, Math.min(1, moonProgress)) * Math.PI) * 60;\n    const moonVisible = moonHour > moonStart - 0.8 && moonHour < moonEnd + 0.8;\n    const moonFade = Math.min(1, Math.min((moonHour - (moonStart - 0.8)), ((moonEnd + 0.8) - moonHour)) / 0.8);\n    const moonOpacity = moonVisible ? Math.max(0, Math.min(1, moonFade)) : 0;\n\n    const nightFactor = 1 - Math.max(0, Math.min(1,\n      Math.min((hour - 4.5) / 1.5, (20 - hour) / 1.5, 1)\n    ));\n    const starsOpacity = Math.max(0, Math.min(0.95, nightFactor));\n\n    if (!this._stars) {\n      const rand = (seed) => { const x = Math.sin(seed * 999) * 10000; return x - Math.floor(x); };\n      this._stars = Array.from({ length: 60 }, (_, i) => ({\n        x: rand(i * 1.3) * 100,\n        y: rand(i * 2.7) * 55,\n        size: 1 + rand(i * 3.1) * 2,\n        op: 0.4 + rand(i * 4.5) * 0.6,\n        dur: 2 + rand(i * 5.9) * 3,\n        delay: rand(i * 7.2) * 4,\n      }));\n    }\n\n    const presetDefs = [\n      { label: 'Amanecer', m: 6 * 60 },\n      { label: 'Mediodía', m: 12 * 60 },\n      { label: 'Atardecer', m: 18 * 60 },\n      { label: 'Noche', m: 22 * 60 },\n    ];\n\n    return {\n      minutes,\n      timeLabel: `${hh}:${mm}`,\n      phaseLabel: f.phase,\n      skyGradient: `linear-gradient(180deg, ${f.top} 0%, ${f.mid} 45%, ${f.horizon} 68%)`,\n      mountainFar: f.mFar,\n      mountainNear: f.mNear,\n      textColor: f.text,\n      textColorSoft: f.text + '55',\n      accent: f.horizon,\n      sunX, sunY, sunOpacity,\n      sunColor: nightFactor > 0.6 ? '#ffb37a' : '#ffd873',\n      sunGlow: 'rgba(255,190,110,0.55)',\n      moonX, moonY, moonOpacity,\n      stars: this._stars,\n      starsOpacity,\n      starsVisible: starsOpacity > 0.01,\n      playLabel: this.state.playing ? '⏸ Pausar' : '▶ Reproducir día',\n      liveLabel: this.state.live ? '🟢 En vivo' : '🕐 Activar en vivo',\n      liveActive: this.state.live ? 'rgba(255,255,255,0.22)' : 'rgba(0,0,0,0.32)',\n      onSlide: this.onSlide,\n      togglePlay: this.togglePlay,\n      toggleLive: this.toggleLive,\n      skyRef: this.skyRef,\n      isAiming: this.state.aiming && this.state.aimAnchor && this.state.aimCurrent,\n      aimAnchorPx: this.state.aimAnchor || { x: 0, y: 0 },\n      aimCurrentPx: this.state.aimCurrent || { x: 0, y: 0 },\n      planes: (this.state.planes.map(pl => {\n        const isNight = nightFactor > 0.5;\n        const color = isNight ? '#e8e8ec' : '#3a3a42';\n        const trailColor = isNight ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.6)';\n\n        if (pl.mode === 'sling') {\n          const elapsed = (Date.now() - pl.startedAt) / pl.duration;\n          const travelPx = elapsed * (pl.rectW + pl.rectH) * 0.9;\n          const curXpx = (pl.originLeft / 100) * pl.rectW + pl.ux * travelPx;\n          const curYpx = (pl.originTop / 100) * pl.rectH + pl.uy * travelPx;\n          const left = (curXpx / pl.rectW) * 100;\n          const top = (curYpx / pl.rectH) * 100;\n          const dir = pl.ux >= 0 ? 1 : -1;\n          const thetaDeg = Math.atan2(pl.uy, pl.ux) * 180 / Math.PI;\n          const transform = dir > 0\n            ? `rotate(${thetaDeg}deg) scaleX(1) rotate(180deg) scaleY(-1)`\n            : `rotate(${thetaDeg - 180}deg) scaleX(-1) rotate(180deg) scaleY(-1)`;\n          return {\n            left, top,\n            transform,\n            trailLen: pl.trailLen, color, trailColor,\n            _done: elapsed >= 1,\n          };\n        }\n\n        const elapsed = (Date.now() - pl.startedAt) / pl.duration;\n        const progress = Math.max(0, Math.min(1, elapsed));\n        const travel = pl.dir > 0 ? (118 - pl.startLeft) : (pl.startLeft + 18);\n        const left = pl.startLeft + pl.dir * progress * travel;\n        return {\n          left,\n          top: pl.top,\n          transform: `scaleX(${pl.dir}) rotate(180deg) scaleY(-1)`,\n          trailLen: pl.trailLen,\n          color, trailColor,\n          _done: elapsed >= 1,\n        };\n      })).filter(pl => !pl._done),\n      presets: presetDefs.map(p => ({\n        label: p.label,\n        onClick: this.setPreset(p.m),\n        active: Math.abs(minutes - p.m) < 30 ? 'rgba(255,255,255,0.22)' : 'rgba(0,0,0,0.32)',\n      })),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
